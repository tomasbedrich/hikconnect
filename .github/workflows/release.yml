name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest

    environment: pypi

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the version can be derived from the git tag

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Run unit tests
        run: |
          python -m poetry install
          python -m poetry run pytest tests

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Check built version matches tag
        run: ls "dist/hikconnect-${GITHUB_REF_NAME}.tar.gz" "dist/hikconnect-${GITHUB_REF_NAME}-py3-none-any.whl"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
